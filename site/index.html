<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Agentic Software Engineering Handbook</title>
  <meta name="description" content="Software engineering & project management in the age of coding agents — harness engineering, agents engineering, eval, governance. Grounded in first-party sources." />
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="assets/vendor/highlight-github.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="progress"></div>

  <header class="topbar">
    <button class="iconbtn" id="menuBtn" aria-label="menu">☰</button>
    <div class="brand">
      <span class="logo">Agentic SDE</span>
      <span class="sub">The Agentic SDE Handbook</span>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <span style="color:var(--ink-faint)">⌕</span>
      <input id="searchInput" type="text" placeholder="Search…" autocomplete="off" />
      <span class="k">/</span>
      <div id="searchResults"></div>
    </div>
    <div class="langtoggle">
      <button data-lang="en">EN</button>
      <button data-lang="zh">中文</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main id="main"></main>
  </div>

  <script src="assets/vendor/marked.min.js"></script>
  <script src="assets/vendor/highlight.min.js"></script>
  <script src="content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
